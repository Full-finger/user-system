# ── nginx 配置：托管前端静态文件 + 反代后端 API ────────────
# 后端在 compose 网络中的地址是 http://app:1323（服务名 app）

# gzip 压缩
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

server {
    listen 80;
    server_name _;

    # 静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # 上传体积（头像等如走 nginx）
    client_max_body_size 8m;

    # ── API 反代到后端 ──────────────────────────────────────
    # /api 与 /health 全部转发给后端容器
    location /api/ {
        proxy_pass http://app:1323;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 连接超时
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    location = /health {
        proxy_pass http://app:1323/health;
    }

    # ── SPA 路由 fallback ──────────────────────────────────
    # 前端是 history 模式路由，找不到文件时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源强缓存（带 hash 的文件可长期缓存）
    location ~* \.(?:js|css|woff2?|ttf|png|jpg|jpeg|gif|svg|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # index.html 不缓存，保证发版即时生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}