openapi: 3.0.3
info:
  title: user-system API
  version: 1.0.0
  description: 用户认证、帖子、节点、关注、点赞及管理员接口。

servers:
  - url: http://localhost:1323
    description: 本地开发

security:
  - BearerToken: []

tags:
  - name: 健康
  - name: 认证
  - name: 用户
  - name: 帖子
  - name: 节点
  - name: 关注
  - name: 管理员

paths:
  /health:
    get:
      tags: [健康]
      summary: 健康检查
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ── 认证 ──────────────────────────────────────────────
  /api/check-username:
    get:
      tags: [认证]
      summary: 检查用户名是否可用
      security: []
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
            minLength: 3
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          available:
                            type: boolean
                            example: true
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/register:
    post:
      tags: [认证]
      summary: 用户注册
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/login:
    post:
      tags: [认证]
      summary: 用户名/邮箱密码登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/send-code:
    post:
      tags: [认证]
      summary: 发送邮箱验证码
      description: 有频率限制。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendCodeRequest"
      responses:
        "200":
          description: 发送成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/code-login:
    post:
      tags: [认证]
      summary: 验证码登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CodeLoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── 用户 ──────────────────────────────────────────────
  /api/profile:
    get:
      tags: [用户]
      summary: 获取个人信息
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      tags: [用户]
      summary: 修改个人信息
      description: 普通用户不能修改自己的角色。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: 修改成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/profile/email:
    put:
      tags: [用户]
      summary: 绑定邮箱
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindEmailRequest"
      responses:
        "200":
          description: 绑定成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/users/{username}:
    get:
      tags: [用户]
      summary: 获取用户公开资料
      description: 可选鉴权，带 token 时返回当前用户是否已关注该用户。
      security: []
      parameters:
        - $ref: "#/components/parameters/Username"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserProfileResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users/{username}/posts:
    get:
      tags: [用户]
      summary: 获取某用户的帖子列表
      description: 可选鉴权，带 token 时返回 liked 状态。
      security: []
      parameters:
        - $ref: "#/components/parameters/Username"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PostListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users/{username}/likes:
    get:
      tags: [用户]
      summary: 获取某用户点赞过的帖子
      description: 可选鉴权。
      security: []
      parameters:
        - $ref: "#/components/parameters/Username"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LikedPostListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── 帖子 ──────────────────────────────────────────────
  /api/posts:
    get:
      tags: [帖子]
      summary: 获取帖子列表
      description: 可选鉴权，带 token 时返回 liked 状态。
      security: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PostListResponse"

    post:
      tags: [帖子]
      summary: 创建帖子
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PostResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/posts/{id}:
    get:
      tags: [帖子]
      summary: 获取帖子详情
      description: 可选鉴权，带 token 时返回 liked 状态。
      security: []
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PostResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [帖子]
      summary: 删除帖子
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/posts/{id}/like:
    put:
      tags: [帖子]
      summary: 点赞/取消点赞
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          liked:
                            type: boolean
                            example: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/feed:
    get:
      tags: [帖子]
      summary: 获取关注用户的帖子流
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PostListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── 节点 ──────────────────────────────────────────────
  /api/nodes:
    get:
      tags: [节点]
      summary: 获取节点列表
      security: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NodeListResponse"

  /api/nodes/{id}:
    get:
      tags: [节点]
      summary: 获取节点详情
      security: []
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NodeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/nodes/{id}/posts:
    get:
      tags: [节点]
      summary: 获取节点下的帖子列表
      description: 可选鉴权，带 token 时返回 liked 状态。
      security: []
      parameters:
        - $ref: "#/components/parameters/NodeId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PostListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── 关注 ──────────────────────────────────────────────
  /api/users/{username}/followers:
    get:
      tags: [关注]
      summary: 获取某用户的粉丝列表
      description: 可选鉴权。
      security: []
      parameters:
        - $ref: "#/components/parameters/Username"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FollowListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users/{username}/followings:
    get:
      tags: [关注]
      summary: 获取某用户的关注列表
      description: 可选鉴权。
      security: []
      parameters:
        - $ref: "#/components/parameters/Username"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FollowListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users/{username}/follow:
    put:
      tags: [关注]
      summary: 关注/取消关注
      parameters:
        - $ref: "#/components/parameters/Username"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          followed:
                            type: boolean
                            example: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── 管理员 ────────────────────────────────────────────
  /api/admin/users:
    get:
      tags: [管理员]
      summary: 获取用户列表
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users/{id}:
    get:
      tags: [管理员]
      summary: 获取指定用户
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [管理员]
      summary: 更新指定用户
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [管理员]
      summary: 删除指定用户
      description: 软删除。
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/posts/{id}:
    delete:
      tags: [管理员]
      summary: 管理员删除帖子
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1

    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

    UserId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: 用户 ID

    Username:
      name: username
      in: path
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 30

    PostId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: 帖子 ID

    NodeId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: 节点 ID

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          description: 响应数据，可能为 null

    # ── User ────────────────────────────────────────────
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: zhangsan
        nickname:
          type: string
          example: 张三
        email:
          type: string
          nullable: true
          example: zhangsan@example.com
        role:
          type: string
          enum: [admin, user]
          example: user
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00+08:00"

    UserListResponse:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/UserResponse"
        total:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 20

    UserProfileResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: zhangsan
        nickname:
          type: string
          example: 张三
        role:
          type: string
          enum: [admin, user]
          example: user
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00+08:00"
        post_count:
          type: integer
          example: 10
        follower_count:
          type: integer
          example: 100
        following_count:
          type: integer
          example: 50
        followed:
          type: boolean
          example: false

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."

    # ── Auth Requests ───────────────────────────────────
    RegisterRequest:
      type: object
      required: [username, password, email, code]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: zhangsan
        password:
          type: string
          minLength: 6
          example: "123456"
        nickname:
          type: string
          example: 张三
        email:
          type: string
          format: email
          example: zhangsan@example.com
        code:
          type: string
          minLength: 6
          maxLength: 6
          description: 邮箱验证码
          example: "123456"

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: 用户名或邮箱
          example: zhangsan
        password:
          type: string
          example: "123456"

    SendCodeRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: zhangsan@example.com

    CodeLoginRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
          example: zhangsan@example.com
        code:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"

    BindEmailRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
          example: zhangsan@example.com
        code:
          type: string
          description: 邮箱验证码
          example: "123456"

    UpdateProfileRequest:
      type: object
      properties:
        password:
          type: string
          minLength: 6
          description: 新密码
          example: "654321"
        nickname:
          type: string
          example: 张三

    UpdateUserRequest:
      type: object
      properties:
        password:
          type: string
          minLength: 6
          description: 新密码
          example: "654321"
        nickname:
          type: string
          example: 张三
        role:
          type: string
          enum: [admin, user]
          description: 用户角色
          example: admin

    # ── Post ────────────────────────────────────────────
    CreatePostRequest:
      type: object
      required: [node_id, title, content]
      properties:
        node_id:
          type: integer
          example: 1
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: "帖子标题"
        content:
          type: string
          minLength: 1
          example: "帖子内容"

    PostResponse:
      type: object
      properties:
        code:
          type: string
          example: "a1b2c3"
        title:
          type: string
          example: "帖子标题"
        content:
          type: string
